spring:
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        name: sonar-mcp-server
        version: 0.1.0
        stdio: true

sonar-mcp:
  data-dir: ${SONAR_MCP_DATA_DIR:${user.home}/.sonar-mcp-server}
  # Which tool groups are exposed in the MCP tools/list manifest. All groups are on by default;
  # turn a group off (e.g. SONAR_MCP_TOOLS_HOTSPOT=false) to shrink the manifest for small-context
  # (local) models that would otherwise be flooded with tool and output schemas at session start.
  # Each flag toggles one @Service tool class.
  tools:
    issue: ${SONAR_MCP_TOOLS_ISSUE:true}         # listIssues/getIssue/getIssueSnippets/getProjectIssuesSummary/getProjectIssuesBreakdown
    project: ${SONAR_MCP_TOOLS_PROJECT:true}     # listProjects/listComponents/getProject/listProjectBranches/listProjectPullRequests
    hotspot: ${SONAR_MCP_TOOLS_HOTSPOT:true}     # listHotspots/getHotspot
    rule: ${SONAR_MCP_TOOLS_RULE:true}           # getRule
  pagination:
    default-limit: ${SONAR_MCP_PAGINATION_DEFAULT_LIMIT:50}
    default-offset: ${SONAR_MCP_PAGINATION_DEFAULT_OFFSET:0}
    max-limit: ${SONAR_MCP_PAGINATION_MAX_LIMIT:500}
  snippet:
    max-lines: ${SONAR_MCP_SNIPPET_MAX_LINES:50}

sonar:
  url: ${SONAR_URL:}
  token: ${SONAR_TOKEN:}
  default-project-key: ${SONAR_DEFAULT_PROJECT_KEY:}
  default-branch: ${SONAR_DEFAULT_BRANCH:}
